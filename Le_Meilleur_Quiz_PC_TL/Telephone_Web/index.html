<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Le Meilleur Quiz de H.M - Mobile</title>
  <style>
    :root {
      --bg: #081208;
      --panel: #122212;
      --line: #5aff78;
      --text: #d8ffe0;
      --muted: #97d3a0;
      --accent: #1e3a1e;
      --danger: #8c1e1e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Consolas, "Courier New", monospace;
      background: radial-gradient(circle at top, #123012, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: min(900px, 100%);
      background: linear-gradient(180deg, #0e1d0e, #0a160a);
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 0 28px rgba(90, 255, 120, 0.2);
    }

    .title {
      font-size: clamp(18px, 4vw, 30px);
      margin: 0 0 10px;
      color: var(--line);
      text-align: center;
    }

    .snake {
      text-align: center;
      color: var(--muted);
      margin: 0 0 14px;
      font-size: 13px;
      opacity: 0.95;
    }

    .card {
      border: 1px solid var(--line);
      background: rgba(16, 34, 16, 0.65);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .hidden { display: none; }

    label { display: block; margin-bottom: 8px; color: var(--muted); }

    select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--accent);
      color: var(--text);
      padding: 12px;
      font-size: 16px;
    }

    button { cursor: pointer; margin-top: 10px; }
    button:hover { filter: brightness(1.1); }

    .status {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .question {
      font-size: clamp(18px, 3.3vw, 25px);
      margin: 10px 0;
      line-height: 1.35;
    }

    .answers {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .result {
      font-size: 18px;
      text-align: center;
      margin-top: 8px;
    }

    .danger { color: #ff9a9a; }

    @media (min-width: 760px) {
      .answers {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">LE MEILLEUR QUIZ DE H.M</h1>
    <p class="snake">~~o====o====o====o====o====o~~ version mobile</p>

    <section id="startCard" class="card">
      <label for="domainSelect">Sur quoi tu veux ce QCM ?</label>
      <select id="domainSelect">
        <option value="voiture">Voiture</option>
        <option value="sport">Sport</option>
        <option value="ecole">Ecole</option>
        <option value="code">Code</option>
        <option value="histoire">Histoire</option>
        <option value="cinema">Cinema</option>
        <option value="musique">Musique</option>
        <option value="geographie">Geographie</option>
        <option value="jeuxvideo">Jeux Video</option>
        <option value="science">Science</option>
      </select>
      <button id="readyBtn">Tu es pret ? Commencer</button>
    </section>

    <section id="gameCard" class="card hidden">
      <div class="status">
        <div id="statusDomain">Domaine: -</div>
        <div id="statusTimer">Temps: 90s</div>
        <div id="statusScore">Score: 0</div>
        <div id="statusBest">Meilleur: 0</div>
      </div>
      <div id="questionText" class="question">Question...</div>
      <div id="answers" class="answers"></div>
      <div id="resultText" class="result"></div>
      <button id="restartBtn" class="hidden">Nouvelle partie</button>
    </section>
  </main>

  <script>
    const QUESTIONS_PER_GAME = 8;
    const TIME_PER_GAME = 90;
    const POINTS_PER_GOOD_ANSWER = 10;
    const BEST_KEY = "hm_quiz_best_score";

    const questionSets = {

        ["Avant de changer de voie ?", ["Klaxonner", "Clignotant", "Freiner fort", "Couper moteur"], 1],
        ["Distance de securite minimale ?", ["1s", "2s", "5s", "10s"], 1],
        ["Route mouillee: il faut...", ["Accelerer", "Freiner tard", "Augmenter distance", "Plein phares"], 2],
        ["Conduire avec telephone en main ?", ["Autorise", "Interdit", "Autorise en ville", "Obligatoire"], 1],
        ["ABS sert a...", ["Bloquer roues", "Eviter blocage", "Allumer phares", "Couper moteur"], 1],
        ["Passage pieton: priorite a...", ["Pietons", "Voitures", "Bus", "Motos"], 0],
        ["Avant long trajet verifier...", ["Pneus/freins", "Radio", "GPS", "Klaxon"], 0],
        ["Rond-point se prend...", ["Gauche", "Droite", "Au hasard", "Arriere"], 1]
      ],
      sport: [
        ["Joueurs par equipe en football ?", ["9", "10", "11", "12"], 2],
        ["Dunk = sport ?", ["Tennis", "Basket", "Rugby", "Natation"], 1],
        ["Marathon environ...", ["21 km", "30 km", "42.195 km", "50 km"], 2],
        ["Panier a 3 points vaut...", ["1", "2", "3", "4"], 2],
        ["Rugby ballon...", ["Rond", "Ovale", "Carre", "Plat"], 1],
        ["Sport de Mbappe ?", ["Basket", "Football", "Tennis", "Cyclisme"], 1],
        ["Tour de France = ...", ["Course", "Cyclisme", "Moto", "Voile"], 1],
        ["Volleyball joueurs terrain ?", ["5", "6", "7", "8"], 1],
        ["Echauffement sert a...", ["Fatiguer", "Prevenir blessures", "Dormir", "Manger"], 1],
        ["Crawl est...", ["Nage", "Saut", "Arbitre", "Equipement"], 0],
        ["Handball gardien utilise...", ["Pieds", "Mains", "Tout le corps", "Aucun"], 2],
        ["Grand Chelem masculin: sets gagnants", ["2", "3", "4", "5"], 1]
      ],
      ecole: [
        ["9 x 7 = ?", ["56", "63", "72", "49"], 1],
        ["Capitale du Maroc ?", ["Rabat", "Fes", "Oujda", "Meknes"], 0],
        ["H2O = ?", ["Oxygene", "Hydrogene", "Eau", "Sel"], 2],
        ["Nombre de continents ?", ["5", "6", "7", "8"], 2],
        ["12 + 15 = ?", ["25", "26", "27", "28"], 2],
        ["Antonyme de grand ?", ["haut", "petit", "large", "fort"], 1],
        ["Le triangle a...", ["2 cotes", "3 cotes", "4 cotes", "5 cotes"], 1],
        ["Phrase commence par...", ["virgule", "majuscule", "chiffre", "rien"], 1],
        ["Photosynthese concerne...", ["animaux", "plantes", "roches", "oceans"], 1],
        ["CPU signifie...", ["Unite centrale de traitement", "Carte universelle", "Code principal", "Controleur public"], 0],
        ["Verbe dans 'Nous etudions' ?", ["Nous", "etudions", "dans", "le"], 1],
        ["Ecriture apparait d'abord en...", ["Mesopotamie", "Amerique", "Australie", "Groenland"], 0]
      ],
      code: [
        ["Quel fichier contient souvent main ?", ["app.h", "main.c", "index.js", "program.py"], 1],
        ["Commentaire ligne en C ?", ["//", "#", "--", "**"], 0],
        ["Fonction pour afficher texte ?", ["scanf", "printf", "malloc", "fopen"], 1],
        ["Egalite en C ?", ["=", "==", "===", "=>"], 1],
        ["Index debut tableau C ?", ["-1", "0", "1", "2"], 1],
        ["break sert a...", ["continuer", "sortir boucle", "arreter PC", "compiler"], 1],
        ["Extension source C ?", [".cpp", ".py", ".c", ".java"], 2],
        ["int est...", ["entier", "texte", "reel", "fichier"], 0],
        ["malloc sert a...", ["allouer memoire", "afficher", "lire clavier", "quitter"], 0],
        ["1 octet = ?", ["4 bits", "8 bits", "16 bits", "32 bits"], 1],
        ["gcc est...", ["compilateur", "navigateur", "jeu", "editeur image"], 0],
        ["srand(time(NULL)) fait...", ["init aleatoire", "ferme appli", "tri", "save"], 0]
      ],
      histoire: [
        ["Pyramides associees a...", ["Egypte ancienne", "Rome", "Grece", "Chine"], 0],
        ["Joconde peinte par...", ["Van Gogh", "Da Vinci", "Picasso", "Monet"], 1],
        ["Revolution francaise commence en...", ["1789", "1492", "1914", "1960"], 0],
        ["Ecriture cuneiforme vient de...", ["Mesopotamie", "Maroc", "Japon", "Bresil"], 0],
        ["Pharaons regnaient sur...", ["Rome", "Egypte", "Inde", "Perou"], 1],
        ["1ere guerre mondiale en...", ["1914", "1939", "1812", "2001"], 0],
        ["Capitale de l'Empire romain ?", ["Athenes", "Rome", "Madrid", "Londres"], 1],
        ["Grande Muraille en...", ["Coree", "Chine", "Japon", "Mongolie"], 1],
        ["Napoleon etait empereur de...", ["France", "Italie", "Allemagne", "Espagne"], 0],
        ["Imprimerie moderne liee a...", ["Gutenberg", "Newton", "Edison", "Tesla"], 0],
        ["1492 = voyage de...", ["Colomb", "Magellan", "Marco Polo", "Ibn Battuta"], 0],
        ["Moyen Age entre...", ["Antiquite et epoque moderne", "1900-2000", "2000-2100", "Rien"], 0]
      ],
      cinema: [
        ["Qui realise un film ?", ["Realisateur", "Gardien", "Cuisinier", "Vendeur"], 0],
        ["Comedie vise a...", ["Faire rire", "Faire peur", "Meteo", "Coder"], 0],
        ["Musique d'un film = ...", ["Bande originale", "Bande passante", "Bande papier", "Bande cache"], 0],
        ["Acteur principal joue...", ["Role important", "Toujours figurant", "Seulement pub", "Aucun role"], 0],
        ["Animation = ...", ["Film dessine/3D", "Journal TV", "Course auto", "Match"], 0],
        ["Court-metrage est...", ["Plus court", "10h", "Toujours 3h", "1 min fixe"], 0],
        ["Generique apparait...", ["Debut/fin", "Jamais", "Seulement pub", "Ticket"], 0],
        ["Festival de Cannes concerne...", ["Cinema", "Foot", "Cuisine", "E-sport"], 0],
        ["Scenario = ...", ["Histoire", "Prix billet", "Plan ville", "Contrat internet"], 0],
        ["IMAX connu pour...", ["Grand format", "Petit ecran", "Sans son", "Sans image"], 0],
        ["Une scene est...", ["Partie du film", "Type de ticket", "Pub", "Camera"], 0],
        ["Montage video sert a...", ["Assembler plans", "Vendre popcorn", "Colorier murs", "Imprimer"], 0]
      ],
      musique: [
        ["Notes dans la gamme do-re-mi ?", ["5", "7", "8", "12"], 1],
        ["Instrument touches noires/blanches ?", ["Piano", "Batterie", "Violon", "Flute"], 0],
        ["Rythme se mesure en...", ["BPM", "FPS", "KM", "GB"], 0],
        ["Chanson sans paroles = ...", ["Instrumentale", "Muette", "Noire", "Calme"], 0],
        ["Symbole demi-ton haut ?", ["b", "#", "%", "@"], 1],
        ["Batterie = instrument de...", ["Cordes", "Percussion", "Vent", "Clavier"], 1],
        ["Micro sert a...", ["Amplifier la voix", "Couper son", "Eteindre scene", "Coder"], 0],
        ["Octave correspond a...", ["8 notes", "4 notes", "2 notes", "16 notes"], 0],
        ["DJ mixe surtout...", ["Pistes audio", "Photos", "Livres", "Cartes"], 0],
        ["Solo signifie...", ["Jouer seul", "Jouer a deux", "Arreter", "Dormir"], 0],
        ["Tempo rapide = ...", ["Lent", "Dynamique", "Silencieux", "Statique"], 1],
        ["Orchestre = ...", ["Groupe de musiciens", "Groupe d'athletes", "Groupe d'eleves", "Equipe PC"], 0]
      ],
      geographie: [
        ["Plus grand ocean ?", ["Atlantique", "Pacifique", "Indien", "Arctique"], 1],
        ["Maroc est en...", ["Europe", "Afrique", "Asie", "Amerique"], 1],
        ["Desert chaud le plus grand ?", ["Gobi", "Sahara", "Kalahari", "Atacama"], 1],
        ["Capitale du Maroc ?", ["Rabat", "Casablanca", "Marrakech", "Fes"], 0],
        ["Nombre de continents ?", ["5", "6", "7", "8"], 2],
        ["Latitude mesure...", ["Nord-Sud", "Est-Ouest", "Altitude", "Temperature"], 0],
        ["Archipel = ...", ["Chaine montagnes", "Groupe d'iles", "Fleuve", "Foret"], 1],
        ["Nil est...", ["Montagne", "Fleuve", "Desert", "Ile"], 1],
        ["Pole Nord dans...", ["Ocean Arctique", "Antarctique", "Sahara", "Amazonie"], 0],
        ["Japon compose de...", ["Iles", "Deserts", "Steppes", "Glaciers"], 0],
        ["Carte politique montre...", ["Frontieres", "Climat", "Relief", "Etoiles"], 0],
        ["Volcan actif peut...", ["Entrer en eruption", "Dormir toujours", "Devenir fleuve", "Disparaitre 1 jour"], 0]
      ],
      jeuxvideo: [
        ["HP dans un jeu = ...", ["Points de vie", "Heure precise", "Hyper pixel", "Haut profil"], 0],
        ["FPS = ...", ["Course", "Tir 1ere personne", "Puzzle", "Sport"], 1],
        ["Boss = ...", ["Ennemi principal", "Menu", "Bug", "Score"], 0],
        ["Manette sert a...", ["Commander jeu", "Imprimer", "Stocker photos", "Reparer PC"], 0],
        ["Multiplayer = ...", ["Jouer a plusieurs", "Solo uniquement", "Sans son", "Sans score"], 0],
        ["Lag vient souvent de...", ["Connexion/perf", "Couleur", "Musique", "Batterie TV"], 0],
        ["RPG met l'accent sur...", ["Scenario/evolution", "Vitesse pure", "Aucun perso", "Tableurs"], 0],
        ["Open world = ...", ["Monde plus libre", "Niveau unique", "Sans carte", "Sans mission"], 0],
        ["Checkpoint sert a...", ["Sauvegarder progression", "Supprimer compte", "Changer console", "Couper son"], 0],
        ["Skin change...", ["Apparence", "Connexion", "Prix", "Clavier"], 0],
        ["Hard = ...", ["Plus difficile", "Plus facile", "Sans ennemis", "Sans score"], 0],
        ["Jeu inde = ...", ["Petite equipe", "Toujours AAA", "Toujours gratuit", "Toujours mobile"], 0]
      ],
      science: [
        ["Eau bout vers...", ["50 C", "75 C", "100 C", "120 C"], 2],
        ["Terre tourne autour...", ["Lune", "Soleil", "Mars", "Venus"], 1],
        ["Symbole oxygene ?", ["O", "Ox", "Og", "Oy"], 0],
        ["Cellule = ...", ["Unite du vivant", "Planete", "Metal", "Volcan"], 0],
        ["Force qui attire vers sol ?", ["Magnetisme", "Gravite", "Pression", "Vitesse"], 1],
        ["Unite temperature courante ?", ["Metre", "Seconde", "Celsius", "Watt"], 2],
        ["Atome contient...", ["Noyau/electrons", "Eau seulement", "Pixels", "Routes"], 0],
        ["Systeme solaire dans...", ["Voie lactee", "Aucune galaxie", "Sahara", "Arctique"], 0],
        ["Photosynthese utilise...", ["Lumiere", "Sable", "Metal", "Carburant"], 0],
        ["Circuit electrique a besoin...", ["Chemin ferme", "Chemin ouvert", "Tube vide", "Ecran"], 0],
        ["Vitesse lumiere est...", ["Tres elevee", "Tres lente", "Nulle", "Au hasard"], 0],
        ["Respiration a besoin de...", ["Oxygene", "Sable", "Bois", "Huile"], 0]
      ]
    };

    const startCard = document.getElementById("startCard");
    const gameCard = document.getElementById("gameCard");
    const domainSelect = document.getElementById("domainSelect");
    const readyBtn = document.getElementById("readyBtn");
    const statusDomain = document.getElementById("statusDomain");
    const statusTimer = document.getElementById("statusTimer");
    const statusScore = document.getElementById("statusScore");
    const statusBest = document.getElementById("statusBest");
    const questionText = document.getElementById("questionText");
    const answers = document.getElementById("answers");
    const resultText = document.getElementById("resultText");
    const restartBtn = document.getElementById("restartBtn");

    let bestScore = Number(localStorage.getItem(BEST_KEY) || 0);
    let score = 0;
    let timeLeft = TIME_PER_GAME;
    let timer = null;
    let currentSet = [];
    let currentIndex = 0;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function updateStatus() {
      const domainName = domainSelect.options[domainSelect.selectedIndex].text;
      statusDomain.textContent = `Domaine: ${domainName}`;
      statusTimer.textContent = `Temps: ${timeLeft}s`;
      statusScore.textContent = `Score: ${score}`;
      statusBest.textContent = `Meilleur: ${bestScore}`;
      if (timeLeft <= 15) statusTimer.classList.add("danger");
      else statusTimer.classList.remove("danger");
    }

    function endGame(reason) {
      clearInterval(timer);
      timer = null;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem(BEST_KEY, String(bestScore));
      }
      updateStatus();
      resultText.textContent = `${reason} | Score final: ${score}`;
      restartBtn.classList.remove("hidden");
      answers.innerHTML = "";
    }

    function showQuestion() {
      if (currentIndex >= QUESTIONS_PER_GAME || currentIndex >= currentSet.length) {
        endGame("Partie terminee");
        return;
      }

      const [qText, choices, good] = currentSet[currentIndex];
      questionText.textContent = `${currentIndex + 1}/${QUESTIONS_PER_GAME} - ${qText}`;
      answers.innerHTML = "";

      choices.forEach((choice, idx) => {
        const btn = document.createElement("button");
        btn.textContent = choice;
        btn.onclick = () => {
          if (idx === good) score += POINTS_PER_GOOD_ANSWER;
          currentIndex += 1;
          updateStatus();
          showQuestion();
        };
        answers.appendChild(btn);
      });
    }

    function startGame() {
      const key = domainSelect.value;
      const bank = questionSets[key] || questionSets.ecole;
      currentSet = shuffle([...bank]);
      score = 0;
      timeLeft = TIME_PER_GAME;
      currentIndex = 0;
      resultText.textContent = "";
      restartBtn.classList.add("hidden");

      startCard.classList.add("hidden");
      gameCard.classList.remove("hidden");

      updateStatus();
      showQuestion();

      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft -= 1;
        updateStatus();
        if (timeLeft <= 0) {
          endGame("Temps termine");
        }
      }, 1000);
    }

    readyBtn.onclick = startGame;
    restartBtn.onclick = startGame;

    updateStatus();
  </script>
</body>
</html>
